<!DOCTYPE html>
<html lang="en">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Morning PT</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Morning PT">
<meta name="theme-color" content="#0E100D">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600&family=IBM+Plex+Mono:wght@500&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0E100D;--card:#161A14;--card2:#1D2119;--bone:#E8E4D9;--dim:#8E9084;--faint:#5C5F55;--tab:#E8B33C;--line:#2A2E26;
--disp:'Oswald',sans-serif;--body:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--ink);color:var(--bone);font-family:var(--body);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{padding:env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + 20px)}
.wrap{max-width:560px;margin:0 auto;padding:16px}
h1{font-family:var(--disp);font-weight:600;font-size:17px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim)}
.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.wk{display:flex;align-items:center;border:1px solid var(--line);border-radius:3px;overflow:hidden}
.wk button{background:var(--card);border:0;color:var(--dim);font-family:var(--mono);font-size:16px;width:34px;height:32px;cursor:pointer}
.wk span{font-family:var(--mono);font-size:11px;color:var(--tab);letter-spacing:.1em;padding:0 10px;text-transform:uppercase}
.p3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:7px}
.p2{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px}
.s{background:var(--card);border:1px solid var(--line);border-radius:3px;padding:15px 6px;text-align:center;cursor:pointer}
.s .n{font-family:var(--disp);font-size:15px;font-weight:500;letter-spacing:.09em;text-transform:uppercase;color:var(--bone)}
.s .d{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint);margin-top:3px}
.s.on{background:var(--tab);border-color:var(--tab)}
.s.on .n,.s.on .d{color:#181307}
.stage{background:var(--card);border:1px solid var(--line);border-radius:3px;overflow:hidden;margin-bottom:14px}
video{width:100%;display:block;background:#000;aspect-ratio:16/9}
.drop{aspect-ratio:16/9;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;padding:20px;text-align:center}
.drop p{color:var(--faint);font-size:12px;max-width:280px}
.pick{font-family:var(--disp);text-transform:uppercase;letter-spacing:.1em;font-size:12px;font-weight:500;background:var(--tab);color:#181307;border:0;border-radius:3px;padding:14px 22px;cursor:pointer}
.hud{padding:16px;border-top:1px solid var(--line)}
.now{font-family:var(--disp);font-size:19px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;line-height:1.2}
.meta{font-family:var(--mono);font-size:10px;color:var(--tab);letter-spacing:.13em;text-transform:uppercase;margin-top:4px;min-height:14px}
.meta.q{color:var(--faint)}
.clock{font-family:var(--mono);font-weight:500;font-size:66px;line-height:1;margin:8px 0;font-variant-numeric:tabular-nums}
.clock.q{color:var(--faint)}
.bar{height:3px;background:var(--line)}
.bar i{display:block;height:100%;width:0;background:var(--tab);transition:width .3s linear}
.ctl{display:grid;grid-template-columns:2fr 1fr;gap:7px;margin-top:14px}
.btn{font-family:var(--disp);text-transform:uppercase;letter-spacing:.09em;font-size:14px;font-weight:500;background:transparent;color:var(--dim);border:1px solid var(--line);border-radius:3px;padding:17px 6px;cursor:pointer}
.btn.go{background:var(--tab);border-color:var(--tab);color:#181307}
.btn.go:disabled{opacity:.3}
.plan{background:var(--card);border:1px solid var(--line);border-radius:3px;padding:14px}
.plan li{list-style:none;display:flex;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line);font-size:14px;color:var(--faint)}
.plan li:last-child{border-bottom:0}
.plan li.cur{color:var(--bone)}
.plan li.cur b{color:var(--tab)}
.plan li.past{opacity:.3}
.plan li b{font-weight:500;font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);white-space:nowrap;padding-top:2px}
.cue{margin-top:12px;padding:11px 12px;background:var(--card2);border-left:2px solid var(--tab);font-size:13px;color:var(--dim)}
.cue b{color:var(--bone);font-weight:500}
</style>
<div class="wrap">
  <div class="head">
    <h1>Morning PT</h1>
    <div class="wk"><button id="wd">−</button><span id="wl">Week 1</span><button id="wu">+</button></div>
  </div>
  <div class="p3" id="p3"></div>
  <div class="p2" id="p2"></div>
  <div class="stage">
    <div class="drop" id="drop">
      <button class="pick" id="pick">Load workout video</button>
      <p>Picked once. Saved on this device. Never uploaded.</p>
    </div>
    <video id="vid" playsinline preload="auto" hidden></video>
    <div class="hud">
      <div class="now" id="now">Ready</div>
      <div class="meta" id="meta">Press start</div>
      <div class="clock" id="clock">00:00</div>
      <div class="bar"><i id="fill"></i></div>
      <div class="ctl">
        <button class="btn go" id="go">Start</button>
        <button class="btn" id="skip">Skip</button>
      </div>
    </div>
  </div>
  <div class="plan"><ul id="list"></ul><div class="cue" id="cue"></div></div>
</div>
<script>
var B={lower:{t:'Lower body',a:20,b:168},push:{t:'Upper body push',a:168,b:319},core:{t:'Core',a:319,b:469},post:{t:'Posterior chain',a:469,b:619},pull:{t:'Posture — I/Y/W lifts',a:619,b:769},fin:{t:'Finisher',a:769,b:9999},all:{t:'Full workout',a:0,b:9999}};
var REST={1:90,2:75,3:60,4:60};
var RUNG={1:'upright',2:'feet forward',3:'feet further out',4:'towel row'};
var WARM='Bend & reach · Rear lunge · Squat bender · Prone row · Push-ups — 10 each, slow';
var COOL='Overhead arm pull · Rear lunge · Single-leg over — 30s each';
var MOB='Warm-up slow · 60s stretch holds · Walk 30 min';
function W(){return{k:'time',t:'Warm-up',m:WARM,s:180}}
function C(){return{k:'time',t:'Cool-down',m:COOL,s:120}}
function V(id,n,w){var o=[],r;for(r=1;r<=n;r++){o.push({k:'vid',id:id,r:r,of:n});if(r<n)o.push({k:'time',t:'Rest',m:'Breathe. Shake it out.',s:REST[w],q:1})}return o}
var SESS={
 upper:{n:'Upper',d:'Push + pull',c:'<b>The doorway rows are the point.</b> Three seconds down. Elbows back, shoulder blades squeezed.',
   b:function(w,l){return [W()].concat(V('push',2,w),V('pull',2,w),[{k:'sets',t:'Doorway rows',sets:l?2:3,reps:10,rest:60,note:RUNG[w]},C()])}},
 lower:{n:'Lower',d:'Legs + hinge',c:'<b>Rear lunge, not forward.</b> Stepping back keeps the knee stacked over the foot.',
   b:function(w){return [W()].concat(V('lower',2,w),V('post',2,w),[C()])}},
 core:{n:'Core',d:'Core + cardio',c:'<b>Hips low on the mountain climbers.</b> If your backside rises, slow down.',
   b:function(w){return [W()].concat(V('core',2,w),V('fin',1,w),[C()])}},
 full:{n:'Full',d:'All 6 rounds',c:'<b>Then go outside.</b> Walk 3 / jog 1 × 4. No 15-minute circuit builds an aerobic base.',
   b:function(w){return [W()].concat(V('all',1,w),[{k:'note',t:'Go outside',m:'Walk 3 / jog 1 × 4, or ruck 40 min'},C()])}},
 mob:{n:'Mobility',d:'Recovery',c:'<b>No push-ups. Nothing.</b> This is the day that makes the other six work.',
   b:function(){return [{k:'time',t:'Mobility',m:MOB,s:2400}]}}
};
var BYDAY=['mob','upper','lower','core','upper','lower','full'];
var dow=new Date().getDay();
var S={sess:BYDAY[dow],light:dow===4,week:1,steps:[],i:0,mode:'idle',t:0,T:0,set:1,tick:null,ready:false,lock:null,gen:0};
function $(i){return document.getElementById(i)}
var vid=$('vid');
function mm(s){s=Math.max(0,Math.ceil(s));return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0')}
try{var r0=JSON.parse(localStorage.getItem('mpt')||'{}');if(r0.week)S.week=r0.week}catch(e){}
function sv(){try{localStorage.setItem('mpt',JSON.stringify({week:S.week}))}catch(e){}}

/* --- the fix: never act until the seek has actually landed --- */
function seekTo(t,cb){
  if(!S.ready){cb();return}
  if(vid.readyState<1){
    var h1=function(){vid.removeEventListener('loadedmetadata',h1);seekTo(t,cb)};
    vid.addEventListener('loadedmetadata',h1);
    return;
  }
  if(Math.abs(vid.currentTime-t)<0.3){cb();return}
  var done=false;
  function fin(){if(done)return;done=true;vid.removeEventListener('seeked',fin);cb()}
  vid.addEventListener('seeked',fin);
  try{vid.currentTime=t}catch(e){fin();return}
  setTimeout(fin,1500);
}

function cell(k){return '<div class="s '+(S.sess===k?'on':'')+'" data-s="'+k+'"><div class="n">'+SESS[k].n+'</div><div class="d">'+SESS[k].d+'</div></div>'}
function drawPicks(){
  $('p3').innerHTML=['upper','lower','core'].map(cell).join('');
  $('p2').innerHTML=['full','mob'].map(cell).join('');
  var els=document.querySelectorAll('.s'),i;
  for(i=0;i<els.length;i++)els[i].onclick=function(){S.sess=this.dataset.s;S.light=false;reset()};
}
function drawPlan(){
  $('list').innerHTML=S.steps.map(function(s,i){
    var t=s.k==='vid'?B[s.id].t:s.t;
    var m=s.k==='vid'?(s.of>1?'R'+s.r+'/'+s.of:'1 round'):(s.k==='sets'?s.sets+'×'+s.reps:'');
    return '<li class="'+(i===S.i?'cur':(i<S.i?'past':''))+'"><span>'+t+'</span><b>'+m+'</b></li>'
  }).join('');
  $('cue').innerHTML=SESS[S.sess].c+(S.light?' <b>Light day — one rung easier.</b>':'');
}
function show(){
  var s=S.steps[S.i];
  if(!s){$('now').textContent='Done';$('meta').textContent='Session complete';$('meta').className='meta q';$('clock').textContent='00:00';$('clock').className='clock q';$('fill').style.width='100%';return}
  $('now').textContent=s.k==='vid'?B[s.id].t:s.t;
  var m=s.k==='vid'?(s.of>1?'Round '+s.r+' of '+s.of:'One round'):(s.k==='sets'?s.sets+' sets × '+s.reps+' — '+s.note:(s.m||''));
  $('meta').textContent=m;
  var q=s.q?' q':'';
  $('meta').className='meta'+q;$('clock').className='clock'+q;
  if(S.mode==='idle')$('clock').textContent=s.k==='vid'?mm(Math.min(B[s.id].b,vid.duration||9999)-B[s.id].a):mm(s.s||0);
  drawPlan();
}
function reset(){
  stop();
  S.gen++;
  S.steps=SESS[S.sess].b(S.week,S.light);S.i=0;S.mode='idle';
  $('wl').textContent='Week '+S.week;
  $('go').textContent='Start';$('go').disabled=!S.ready&&S.sess!=='mob';
  $('fill').style.width='0';
  drawPicks();drawPlan();show();
  var f=null,i;
  for(i=0;i<S.steps.length;i++)if(S.steps[i].k==='vid'){f=S.steps[i];break}
  if(f&&S.ready)seekTo(B[f.id].a+0.25,function(){});
}
function begin(){
  var s=S.steps[S.i];if(!s)return;
  clearInterval(S.tick);
  if(s.k==='vid'){
    S.mode='run';
    var g=S.gen, a=B[s.id].a;
    $('clock').textContent='···';
    seekTo(a,function(){
      if(g!==S.gen||S.mode!=='run')return;          // user switched session mid-seek
      var p=vid.play();if(p&&p.catch)p.catch(function(){});
      S.tick=setInterval(function(){
        var end=Math.min(B[s.id].b,vid.duration||9999);
        var ct=vid.currentTime;
        if(ct<a-1)return;                            // seek still settling — hold
        $('clock').textContent=mm(end-ct);
        $('fill').style.width=(100*(ct-a)/(end-a))+'%';
        if(ct>=end-0.15){vid.pause();next()}
      },200);
    });
  } else if(s.k==='sets'){
    S.mode='work';S.set=1;
    $('go').textContent='Set done';$('clock').textContent='GO';
    $('meta').textContent='Set 1 of '+s.sets+' — '+s.reps+' reps, 3s down';
  } else if(s.k==='note'){
    S.mode='note';$('clock').textContent='—';$('fill').style.width='100%';$('go').textContent='Next';
  } else {
    S.mode='run';S.t=s.s;S.T=s.s;$('clock').textContent=mm(S.t);
    S.tick=setInterval(function(){S.t--;$('clock').textContent=mm(S.t);$('fill').style.width=(100*(1-S.t/S.T))+'%';if(S.t<=0)next()},1000);
  }
}
function next(){
  clearInterval(S.tick);vid.pause();S.i++;$('fill').style.width='0';
  if(S.i>=S.steps.length){S.mode='idle';$('go').textContent='Start';rel();show();return}
  $('go').textContent='Pause';show();begin();
}
function tap(){
  var s=S.steps[S.i];if(!s){reset();return}
  if(S.mode==='idle'){wake();$('go').textContent='Pause';begin();show();return}
  if(S.mode==='note'){next();return}
  if(S.mode==='work'){
    S.set++;
    if(S.set>s.sets){next();return}
    S.mode='rest';S.t=s.rest;S.T=s.rest;
    $('meta').textContent='Rest — set '+(S.set-1)+' of '+s.sets+' done';
    $('go').textContent='Pause';
    S.tick=setInterval(function(){
      S.t--;$('clock').textContent=mm(S.t);$('fill').style.width=(100*(1-S.t/S.T))+'%';
      if(S.t<=0){clearInterval(S.tick);S.mode='work';$('clock').textContent='GO';$('go').textContent='Set done';
        $('meta').textContent='Set '+S.set+' of '+s.sets+' — '+s.reps+' reps';$('fill').style.width='0'}
    },1000);
    return;
  }
  if(S.mode==='pause'){S.mode='run';$('go').textContent='Pause';begin();return}
  clearInterval(S.tick);vid.pause();S.mode='pause';$('go').textContent='Resume';
}
function stop(){clearInterval(S.tick);try{vid.pause()}catch(e){}S.mode='idle';rel()}
function wake(){try{navigator.wakeLock.request('screen').then(function(l){S.lock=l},function(){})}catch(e){}}
function rel(){try{if(S.lock){S.lock.release();S.lock=null}}catch(e){}}

function idb(){return new Promise(function(res,rej){var q=indexedDB.open('mpt',1);q.onupgradeneeded=function(){q.result.createObjectStore('v')};q.onsuccess=function(){res(q.result)};q.onerror=function(){rej()}})}
function put(f){return idb().then(function(d){return new Promise(function(res){var t=d.transaction('v','readwrite');t.objectStore('v').put(f,'file');t.oncomplete=res;t.onerror=res})})}
function get(){return idb().then(function(d){return new Promise(function(res){var q=d.transaction('v','readonly').objectStore('v').get('file');q.onsuccess=function(){res(q.result)};q.onerror=function(){res(null)}})}).catch(function(){return null})}
function mount(f){
  vid.src=URL.createObjectURL(f);
  vid.hidden=false;$('drop').style.display='none';S.ready=true;
  vid.addEventListener('loadedmetadata',function(){reset()},{once:true});
  vid.load();
  reset();
}

$('pick').onclick=function(){
  var i=document.createElement('input');i.type='file';i.accept='video/*';
  i.onchange=function(e){
    var f=e.target.files[0];if(!f)return;
    if(navigator.storage&&navigator.storage.persist)navigator.storage.persist().catch(function(){});
    put(f).catch(function(){}).then(function(){mount(f)});
  };
  i.click();
};
$('go').onclick=tap;
$('skip').onclick=function(){if(S.mode==='idle'){S.i=Math.min(S.i+1,S.steps.length-1);show()}else next()};
$('wu').onclick=function(){S.week=Math.min(4,S.week+1);sv();reset()};
$('wd').onclick=function(){S.week=Math.max(1,S.week-1);sv();reset()};

reset();
get().then(function(f){if(f)mount(f)});
if('serviceWorker' in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
</html>
